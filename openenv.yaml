name: sql-antigravity-env
version: "0.1.0"
description: >
  A real-world OpenEnv environment where AI agents learn to review
  SQL queries for syntax errors, performance anti-patterns, and
  security vulnerabilities.
author: Resq-Minds
tags:
  - openenv
  - sql
  - code-review
  - security
tasks:
  - id: task_easy
    difficulty: easy
    description: Detect misspelled SQL keywords
  - id: task_medium
    difficulty: medium
    description: Identify SELECT * and missing WHERE clause
  - id: task_hard
    difficulty: hard
    description: Detect SQL injection vulnerability
reward_range: [0.0, 1.0]
max_episode_steps: 9
